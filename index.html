<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 转图片 - VIP</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #07c160 0%, #06ad56 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 450px; margin: 0 auto; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    h1 { color: #07c160; margin-bottom: 15px; font-size: 22px; text-align: center; }
    .vip-badge { display: none; background: linear-gradient(90deg, #ffd700, #ffaa00); color: #000; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-bottom: 15px; text-align: center; }
    .vip-badge.show { display: block; }
    .vip-banner { background: linear-gradient(90deg, #07c160, #06ad56); color: #fff; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
    .vip-banner-vip { background: linear-gradient(90deg, #ffd700, #ffaa00); color: #000; }
    .settings { background: #f5f5f5; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
    .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .setting-row:last-child { margin-bottom: 0; }
    .setting-label { color: #666; font-size: 14px; }
    select { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .upload-area { border: 2px dashed #07c160; border-radius: 10px; padding: 40px 20px; text-align: center; cursor: pointer; background: #f0fdf4; }
    .upload-icon { font-size: 50px; }
    .upload-text { color: #07c160; margin-top: 8px; }
    #fileInput { display: none; }
    #preview { margin-top: 15px; }
    .preview-item { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    .preview-item img { max-width: 100%; border-radius: 6px; }
    .download-btn { display: block; width: 100%; padding: 14px; background: #07c160; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 12px; }
    .vip-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
    .vip-modal.show { display: flex; justify-content: center; align-items: center; }
    .vip-content { background: white; padding: 20px; border-radius: 16px; text-align: center; max-width: 300px; width: 90%; }
    .vip-title { font-size: 20px; font-weight: bold; color: #07c160; margin-bottom: 10px; }
    .vip-price { font-size: 28px; color: #ff5a00; margin-bottom: 15px; font-weight: bold; }
    .qr-img { width: 140px; height: 140px; border-radius: 8px; border: 2px solid #eee; }
    .vip-btn { display: block; width: 100%; padding: 12px; background: #07c160; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 12px; font-weight: bold; }
    .vip-btn-pay { background: #ff5a00; }
    .vip-btn:active { transform: scale(0.98); }
    .vip-close { background: #999; }
    .history-btn { position: fixed; bottom: 20px; right: 20px; width: 44px; height: 44px; background: #07c160; border-radius: 50%; font-size: 20px; }
    .step { display: none; }
    .step.active { display: block; }
    .code-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-top: 10px; text-align: center; }
    .warning { background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; font-size: 12px; margin: 10px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 PDF 转图片</h1>
    
    <div class="vip-badge" id="vipBadge">👑 VIP会员 已开通</div>
    
    <div class="vip-banner" id="vipBanner" onclick="showVip()">
      🌟 开通 VIP - ¥9.9/月
    </div>
    
    <div class="settings">
      <div class="setting-row">
        <span class="setting-label">图片质量</span>
        <select id="quality">
          <option value="1">标准</option>
          <option value="2">高清</option>
          <option value="0.5">快速</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">图片格式</span>
        <select id="format">
          <option value="png">PNG</option>
          <option value="jpeg">JPEG</option>
        </select>
      </div>
    </div>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📁</div>
      <div class="upload-text">点击选择 PDF 文件</div>
    </div>
    <input type="file" id="fileInput" accept=".pdf" onchange="handleFile(this.files[0])">
    
    <div id="preview"></div>
  </div>
  
  <div class="history-btn" onclick="showHistory()">📜</div>
  
  <!-- VIP弹窗 -->
  <div class="vip-modal" id="vipModal">
    <div class="vip-content">
      <!-- 步骤1: 支付 -->
      <div class="step active" id="step1">
        <div class="vip-title">👑 开通 VIP</div>
        <p style="font-size:13px;color:#666;">✅ 批量下载打包<br>✅ 高清画质</p>
        <div class="vip-price">¥9.9/月</div>
        
        <img src="https://raw.githubusercontent.com/renfei15238568276-ship-it/pdf2img-images/main/wechat.jpg" class="qr-img" alt="微信支付">
        <p style="font-size:12px;color:#666;margin:8px 0;">长按二维码付款 ¥9.9</p>
        
        
        <button class="vip-btn vip-close" onclick="closeVip()">取消</button>
      </div>
      
      <!-- 步骤2: 联系客服 -->
      <div class="step" id="step2">
        <div style="font-size:48px;">⏰</div>
        <h3 style="margin:15px 0;">等待确认</h3>
        <p style="font-size:14px;color:#666;margin-bottom:15px;">付款后请截图发给微信客服<br><strong>r18974670134</strong><br>客服确认后会给您兑换码</p>
        
        <div class="code-input-section">
          <p style="font-size:13px;color:#666;">收到兑换码后输入：</p>
          <input type="text" id="vipCode" class="code-input" placeholder="请输入兑换码">
          <button class="vip-btn" style="margin-top:10px;" onclick="redeemCode()">立即兑换</button>
        </div>
        
        <button class="vip-btn vip-close" style="margin-top:15px;" onclick="showStep1()">返回</button>
      </div>
    </div>
  </div>
  
  <div id="historyModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;">
    <div style="background:white;padding:20px;max-height:80vh;overflow-y:auto;border-radius:16px;margin:20px;">
      <h3>📜 转换历史</h3>
      <div id="historyList"></div>
      <button onclick="closeHistory()" style="margin-top:15px;padding:10px;width:100%;background:#07c160;color:white;border:none;border-radius:8px;">关闭</button>
    </div>
  </div>
  
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    
    let currentFileName = '';
    let convertedImages = [];
    let isVip = localStorage.getItem('isVip') === 'true';
    
    if (isVip) {
      document.getElementById('vipBadge').classList.add('show');
      document.getElementById('vipBanner').innerHTML = '👑 VIP会员专享';
      document.getElementById('vipBanner').classList.add('vip-banner-vip');
    }
    
    function showVip() { 
      if (isVip) {
        alert('您已经是VIP会员了');
        return;
      }
      showStep2();
      document.getElementById('vipModal').classList.add('show'); 
    }
    function closeVip() { 
      document.getElementById('vipModal').classList.remove('show');
    }
    function showStep1() {
      document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
      document.getElementById('step1').classList.add('active');
    }
    function showStep2() {
      document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
      document.getElementById('step2').classList.add('active');
    }
    function redeemCode() {
      const code = document.getElementById('vipCode').value.trim().toUpperCase();
      if (code.startsWith('VIP') && code.length >= 10) {
        isVip = true;
        localStorage.setItem('isVip', 'true');
        
        document.getElementById('vipBadge').classList.add('show');
        document.getElementById('vipBanner').innerHTML = '👑 VIP会员专享';
        document.getElementById('vipBanner').classList.add('vip-banner-vip');
        
        alert('✅ VIP开通成功！');
        closeVip();
        
        // 刷新页面更新按钮
        location.reload();
      } else {
        alert('兑换码无效，请联系客服获取正确的兑换码');
      }
    }
    function showHistory() {
      const history = JSON.parse(localStorage.getItem('pdfHistory') || '[]');
      document.getElementById('historyList').innerHTML = history.length ? 
        history.map(h => `<div style="padding:10px;border-bottom:1px solid #eee;font-size:12px;">${h.name}<br>${h.pages}页 - ${h.date}</div>`).join('') : 
        '<p style="color:#999;">暂无记录</p>';
      document.getElementById('historyModal').style.display = 'block';
    }
    function closeHistory() { document.getElementById('historyModal').style.display = 'none'; }
    
    async function handleFile(file) {
      if (!file) return;
      currentFileName = file.name;
      
      const quality = parseFloat(document.getElementById('quality').value);
      const format = document.getElementById('format').value;
      
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
      
      const preview = document.getElementById('preview');
      preview.innerHTML = `<div style="text-align:center;padding:20px;">⏳ 正在转换... ${pdf.numPages} 页</div>`;
      
      convertedImages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({scale: quality});
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
        
        convertedImages.push({ page: i, data: canvas.toDataURL('image/' + format, 0.9) });
        preview.innerHTML = `<div style="text-align:center;">⏳ 转换中... ${i}/${pdf.numPages}</div>`;
      }
      
      const history = JSON.parse(localStorage.getItem('pdfHistory') || '[]');
      history.unshift({ name: file.name, pages: pdf.numPages, date: new Date().toLocaleString() });
      localStorage.setItem('pdfHistory', JSON.stringify(history.slice(0, 20)));
      
      let html = `<div style="margin-bottom:10px;">✅ 转换完成 (${pdf.numPages} 页)</div>`;
      convertedImages.forEach(img => {
        html += `<div class="preview-item"><img src="${img.data}"></div>`;
      });
      
      if (isVip) {
        html += '<button class="download-btn" onclick="downloadAll()">📦 批量下载</button>';
      } else {
        html += '<button class="download-btn" onclick="showVip()">📦 批量下载 (开通VIP)</button>';
      }
      preview.innerHTML = html;
    }
    
    async function downloadAll() {
      const format = document.getElementById('format').value;
      const zip = new JSZip();
      convertedImages.forEach(img => {
        zip.file(`page_${img.page}.${format}`, img.data.split(',')[1], {base64: true});
      });
      const blob = await zip.generateAsync({type:'blob'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = currentFileName.replace('.pdf', '_images.zip');
      a.click();
    }
  </script>
</body>
</html>
