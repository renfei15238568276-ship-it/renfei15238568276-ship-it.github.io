<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 转图片 - VIP</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    h1 { color: #1e293b; margin-bottom: 20px; font-size: 24px; text-align: center; }
    .vip-banner { background: linear-gradient(90deg, #ffd700, #ffaa00); color: #000; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; margin-bottom: 20px; cursor: pointer; }
    .settings { background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
    .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .setting-row:last-child { margin-bottom: 0; }
    .setting-label { color: #475569; font-size: 14px; }
    select, input[type="text"] { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
    .upload-area { border: 3px dashed #667eea; border-radius: 12px; padding: 50px 20px; text-align: center; cursor: pointer; transition: all 0.3s; background: #f8fafc; }
    .upload-area:hover { border-color: #764ba2; background: #f0f4ff; transform: scale(1.02); }
    .upload-icon { font-size: 60px; margin-bottom: 12px; }
    .upload-text { color: #64748b; font-size: 16px; }
    #fileInput { display: none; }
    #preview { margin-top: 20px; }
    .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .preview-item { background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 12px; }
    .preview-item img { max-width: 100%; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .download-all { display: block; width: 100%; padding: 14px; background: linear-gradient(90deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    .download-all:disabled { background: #ccc; cursor: not-allowed; }
    .vip-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; }
    .vip-modal.show { display: flex; justify-content: center; align-items: center; }
    .vip-content { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 320px; }
    .vip-title { font-size: 24px; font-weight: bold; color: #ffd700; margin-bottom: 15px; }
    .vip-price { font-size: 36px; color: #e74c3c; margin-bottom: 20px; }
    .qr-section { margin: 20px 0; }
    .qr-title { font-size: 16px; color: #333; margin-bottom: 10px; }
    .qr-img { width: 180px; height: 180px; border: 2px solid #ddd; border-radius: 10px; }
    .vip-btn { display: block; width: 100%; padding: 14px; background: #e74c3c; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
    .vip-close { background: #95a5a6; }
    .history-btn { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; background: #667eea; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; box-shadow: 0 4px 15px rgba(102,126,234,0.4); cursor: pointer; }
    .history-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
    .history-modal.show { display: block; }
    .history-content { background: white; padding: 20px; max-height: 80vh; overflow-y: auto; border-radius: 20px; margin: 20px; }
    .history-item { padding: 10px; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📄 PDF 转图片 VIP</h1>
    
    <div class="vip-banner" onclick="showVip()">
      🌟 点击开通 VIP - 解锁全部功能
    </div>
    
    <div class="settings">
      <div class="setting-row">
        <span class="setting-label">图片质量</span>
        <select id="quality">
          <option value="1">标准 (推荐)</option>
          <option value="2">高清</option>
          <option value="0.5">快速</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">图片格式</span>
        <select id="format">
          <option value="png">PNG</option>
          <option value="jpeg">JPEG</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">页面范围</span>
        <input type="text" id="pageRange" placeholder="如: 1-5 或 1,3,5" style="width: 120px;">
      </div>
    </div>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📁</div>
      <div class="upload-text">点击选择 PDF 文件</div>
    </div>
    <input type="file" id="fileInput" accept=".pdf" onchange="handleFile(this.files[0])">
    
    <div id="preview"></div>
  </div>
  
  <div class="history-btn" onclick="showHistory()">📜</div>
  
  <!-- VIP 弹窗 -->
  <div class="vip-modal" id="vipModal" onclick="closeVip()">
    <div class="vip-content" onclick="event.stopPropagation()">
      <div class="vip-title">👑 VIP 特权</div>
      <p>✅ 批量下载打包<br>✅ 高清画质<br>✅ 无限制转换<br>✅ 专属客服</p>
      <div class="vip-price">¥9.9/月</div>
      
      <div class="qr-section">
        <div class="qr-title">📱 微信支付</div>
        <!-- 这里放你的微信收款码图片链接 -->
        <img src="https://via.placeholder.com/180x180/07c160/ffffff?text=微信付款码" class="qr-img" alt="微信支付码">
      </div>
      
      <div class="qr-section">
        <div class="qr-title">💰 支付宝</div>
        <!-- 这里放你的支付宝收款码图片链接 -->
        <img src="https://via.placeholder.com/180x180/1677ff/ffffff?text=支付宝付款码" class="qr-img" alt="支付宝支付码">
      </div>
      
      <p style="font-size:12px;color:#666;margin:15px 0;">* 付款后联系客服开通 VIP</p>
      <button class="vip-btn vip-close" onclick="closeVip()">关闭</button>
    </div>
  </div>
  
  <!-- 历史记录弹窗 -->
  <div class="history-modal" id="historyModal" onclick="closeHistory()">
    <div class="history-content" onclick="event.stopPropagation()">
      <h2>📜 转换历史</h2>
      <div id="historyList"></div>
      <button onclick="closeHistory()" style="margin-top:15px;padding:10px;width:100%;">关闭</button>
    </div>
  </div>
  
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    
    let currentPdf = null;
    let currentFileName = '';
    let convertedImages = [];
    
    function showVip() { document.getElementById('vipModal').classList.add('show'); }
    function closeVip() { document.getElementById('vipModal').classList.remove('show'); }
    function showHistory() {
      const history = JSON.parse(localStorage.getItem('pdfHistory') || '[]');
      document.getElementById('historyList').innerHTML = history.length ? 
        history.map((h,i) => `<div class="history-item">${h.name} - ${h.pages}页 - ${h.date}</div>`).join('') : 
        '<p>暂无记录</p>';
      document.getElementById('historyModal').classList.add('show');
    }
    function closeHistory() { document.getElementById('historyModal').classList.remove('show'); }
    
    async function handleFile(file) {
      if (!file) return;
      currentFileName = file.name;
      
      const quality = parseFloat(document.getElementById('quality').value);
      const format = document.getElementById('format').value;
      const pageRange = document.getElementById('pageRange').value;
      
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
      currentPdf = pdf;
      
      let pages = [];
      if (pageRange) {
        const parts = pageRange.split(',');
        parts.forEach(p => {
          if (p.includes('-')) {
            const [start, end] = p.split('-').map(Number);
            for (let i = start; i <= end && i <= pdf.numPages; i++) pages.push(i);
          } else {
            const n = parseInt(p);
            if (n <= pdf.numPages) pages.push(n);
          }
        });
      } else {
        for (let i = 1; i <= pdf.numPages; i++) pages.push(i);
      }
      
      const preview = document.getElementById('preview');
      preview.innerHTML = `<div style="text-align:center;padding:20px;">⏳ 正在转换... ${pages.length} 页</div>`;
      
      convertedImages = [];
      for (let i = 0; i < pages.length; i++) {
        const pageNum = pages[i];
        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({scale: quality});
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
        
        const dataUrl = canvas.toDataURL('image/' + format, 0.9);
        convertedImages.push({ page: pageNum, data: dataUrl });
        
        preview.innerHTML = `<div style="text-align:center;padding:20px;">⏳ 转换中... ${i+1}/${pages.length}</div>`;
      }
      
      const history = JSON.parse(localStorage.getItem('pdfHistory') || '[]');
      history.unshift({ name: file.name, pages: pages.length, date: new Date().toLocaleString() });
      localStorage.setItem('pdfHistory', JSON.stringify(history.slice(0, 20)));
      
      let html = `<div class="preview-header"><span>✅ 转换完成 (${pages.length} 页)</span></div>`;
      convertedImages.forEach((img, idx) => {
        html += `<div class="preview-item"><img src="${img.data}"></div>`;
      });
      html += '<button class="download-all" onclick="downloadAll()">📦 批量下载 (VIP)</button>';
      preview.innerHTML = html;
    }
    
    async function downloadAll() {
      alert('请先开通 VIP！点击顶部黄色横幅开通');
      showVip();
    }
    
    async function downloadSelected() {
      const format = document.getElementById('format').value;
      const zip = new JSZip();
      
      convertedImages.forEach((img, i) => {
        const data = img.data.split(',')[1];
        zip.file(`page_${img.page}.${format}`, data, {base64: true});
      });
      
      const blob = await zip.generateAsync({type:'blob'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = currentFileName.replace('.pdf', '_images.zip');
      a.click();
    }
  </script>
</body>
</html>
